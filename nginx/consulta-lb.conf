# =========================================================
# Load balancer para el microservicio Consulta
# - upstream "consulta" usa el DNS interno de Docker, que
#   resuelve a todas las réplicas levantadas con
#   `docker compose up --scale consulta=N` (RNF3).
# - Devuelve 503 con cuerpo JSON cuando ninguna réplica
#   responde, para que el frontend muestre un mensaje
#   amigable en lugar de un error técnico.
# =========================================================

# DNS interno de Docker (siempre 127.0.0.11). Con `valid=5s`
# nginx re-resuelve "consulta" cada 5 segundos, así detecta
# nuevas réplicas o caídas en cuanto cambia el DNS.
resolver 127.0.0.11 valid=5s ipv6=off;

server {
    listen 8000;
    server_name _;

    # CORS para el frontend (Vite dev server en :5173).
    add_header Access-Control-Allow-Origin "http://localhost:5173" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

    # Mensaje amigable cuando consulta está apagado o sin réplicas.
    error_page 502 503 504 = @consulta_unavailable;

    location @consulta_unavailable {
        default_type application/json;
        add_header Access-Control-Allow-Origin "http://localhost:5173" always;
        add_header Access-Control-Allow-Credentials "true" always;
        return 503 '{"detail":"El servicio de consulta no está disponible en este momento. Intenta de nuevo en unos segundos."}';
    }

    location / {
        if ($request_method = OPTIONS) {
            return 204;
        }

        # Usamos una variable en proxy_pass para forzar resolución
        # DNS dinámica en cada request. Sin esto, nginx OSS guarda
        # solo la primera IP que resuelve al arrancar y no rota
        # entre las N réplicas creadas por `--scale consulta=N`.
        set $consulta_upstream "consulta:8000";

        proxy_pass http://$consulta_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 3s;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;
    }
}

# =========================================================
# Load balancer para el microservicio Consulta
# - upstream "consulta" usa el DNS interno de Docker, que
#   resuelve a todas las réplicas levantadas con
#   `docker compose up --scale consulta=N` (RNF3).
# - Devuelve 503 con cuerpo JSON cuando ninguna réplica
#   responde, para que el frontend muestre un mensaje
#   amigable en lugar de un error técnico.
# =========================================================

resolver 127.0.0.11 valid=10s ipv6=off;

upstream consulta_backend {
    # Usamos el nombre del servicio; docker-compose lo
    # resuelve round-robin entre las réplicas activas.
    server consulta:8000 max_fails=1 fail_timeout=5s;
}

server {
    listen 8000;
    server_name _;

    # CORS para el frontend (Vite dev server en :5173).
    add_header Access-Control-Allow-Origin "http://localhost:5173" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

    # Mensaje amigable cuando consulta está apagado o sin réplicas.
    error_page 502 503 504 = @consulta_unavailable;

    location @consulta_unavailable {
        default_type application/json;
        return 503 '{"detail":"El servicio de consulta no está disponible en este momento. Intenta de nuevo en unos segundos."}';
    }

    location / {
        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass http://consulta_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 3s;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;

        # Si una réplica falla, intenta la siguiente.
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
    }
}

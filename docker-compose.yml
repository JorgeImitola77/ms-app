# =========================================================
# ExplorApp — Orquestación de servicios
# - Red interna privada: app_network (bridge)
# - PostgreSQL sin puerto publicado al host (RNF5)
# - Variables de entorno cargadas desde .env
# =========================================================

services:

  # ---------------------------------------------------------
  # 1. Base de datos PostgreSQL
  #    - SIN puerto publicado al host (solo accesible dentro
  #      de la red app_network). Cumple RNF5.
  # ---------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg15
    container_name: explorapp_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------
  # 2. Microservicio: Creación (POST)
  # ---------------------------------------------------------
  creacion:
    build: ./microservicios/ms-crear
    container_name: explorapp_creacion
    restart: unless-stopped
    env_file: .env
    ports:
      - "${MS_CREACION_PORT:-8001}:8000"
    volumes:
      - ./microservicios/shared:/app/shared:ro
      - photos:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  # ---------------------------------------------------------
  # 3. Microservicio: Modificación (PUT/PATCH)
  # ---------------------------------------------------------
  modificacion:
    build: ./microservicios/ms-modificar
    container_name: explorapp_modificacion
    restart: unless-stopped
    env_file: .env
    ports:
      - "${MS_MODIFICACION_PORT:-8002}:8000"
    volumes:
      - ./microservicios/shared:/app/shared:ro
      - photos:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  # ---------------------------------------------------------
  # 4. Microservicio: Consulta (GET) — diseñado para escalar
  #    Usar:  docker compose up -d --scale consulta=N
  #    No publica puertos directamente: el acceso desde el
  #    host es a través de consulta-lb (nginx) en :8003,
  #    que reparte las peticiones entre las réplicas y
  #    devuelve 503 cuando el servicio está apagado (RNF3).
  # ---------------------------------------------------------
  consulta:
    build: ./microservicios/ms-consultar
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    volumes:
      - ./microservicios/shared:/app/shared:ro
      - photos:/app/uploads:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ---------------------------------------------------------
  # 4.1 Load balancer del microservicio Consulta
  #     - Expone :8003 al host (lo que antes hacía consulta).
  #     - Hace round-robin entre las N réplicas del servicio
  #       consulta usando el DNS interno de Docker.
  #     - Devuelve 503 amigable si no hay réplicas activas.
  # ---------------------------------------------------------
  consulta-lb:
    image: nginx:1.27-alpine
    container_name: explorapp_consulta_lb
    restart: unless-stopped
    ports:
      - "${MS_CONSULTA_PORT:-8003}:8000"
    volumes:
      - ./nginx/consulta-lb.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      consulta:
        condition: service_healthy
        required: false
    networks:
      - app_network

  # ---------------------------------------------------------
  # 5. Microservicio: Borrado (DELETE)
  # ---------------------------------------------------------
  borrado:
    build: ./microservicios/ms-borrar
    container_name: explorapp_borrado
    restart: unless-stopped
    env_file: .env
    ports:
      - "${MS_BORRADO_PORT:-8004}:8000"
    volumes:
      - ./microservicios/shared:/app/shared:ro
      - photos:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  # ---------------------------------------------------------
  # 6. Microservicio: Log (auditoría)
  # ---------------------------------------------------------
  log:
    build: ./microservicios/ms-log
    container_name: explorapp_log
    restart: unless-stopped
    env_file: .env
    ports:
      - "${MS_LOG_PORT:-8005}:8000"
    volumes:
      - ./microservicios/shared:/app/shared:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  # ---------------------------------------------------------
  # 7. n8n — motor de automatización + RAG
  #    Conecta a PostgreSQL por la red interna app_network
  #    usando el host "postgres" (nombre del servicio).
  # ---------------------------------------------------------
  n8n:
    image: n8nio/n8n:latest
    container_name: explorapp_n8n
    restart: unless-stopped
    env_file: .env
    environment:
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: ${N8N_PORT}
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      NODE_ENV: ${NODE_ENV}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678/}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-America/Bogota}
    ports:
      - "${N8N_PUBLIC_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/workflows:ro
      - ./n8n/credentials:/home/node/credentials:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  # ---------------------------------------------------------
  # 8. Frontend — React + Vite + Tailwind
  #    El volumen monta el código fuente del host dentro del
  #    contenedor para que Vite HMR detecte cambios en tiempo real.
  #    node_modules queda aislado con un volumen anónimo para no
  #    pisar los módulos instalados dentro del contenedor.
  # ---------------------------------------------------------
  frontend:
    build: ./frontend
    container_name: explorapp_frontend
    restart: unless-stopped
    env_file: .env
    environment:
      - VITE_AUTH0_DOMAIN=${AUTH0_DOMAIN}
      - VITE_AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID}
      - VITE_AUTH0_AUDIENCE=${AUTH0_AUDIENCE}
      - VITE_N8N_RAG_URL=${VITE_N8N_RAG_URL:-http://localhost:5678/webhook/rag-consulta}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - creacion
      - modificacion
      - consulta-lb
      - borrado
      - log
    networks:
      - app_network

# =========================================================
# Red interna privada
# =========================================================
networks:
  app_network:
    driver: bridge
    name: explorapp_app_network

# =========================================================
# Volúmenes persistentes
# =========================================================
volumes:
  pg_data:
    name: explorapp_pg_data
  photos:
    name: explorapp_photos
  n8n_data:
    name: explorapp_n8n_data

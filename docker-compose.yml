# =========================================================
# ExplorApp — Orquestación de servicios
# - Red interna privada: app_network (bridge)
# - PostgreSQL sin puerto publicado al host (RNF5)
# - Variables de entorno cargadas desde .env
# =========================================================

services:

  # ---------------------------------------------------------
  # 1. Base de datos PostgreSQL
  #    - SIN puerto publicado al host (solo accesible dentro
  #      de la red app_network). Cumple RNF5.
  # ---------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg15
    container_name: explorapp_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------
  # 2. Microservicio: Creación (POST)
  # ---------------------------------------------------------
  creacion:
    build: ./microservicios/ms-crear
    container_name: explorapp_creacion
    restart: unless-stopped
    env_file: .env
    ports:
      - "${MS_CREACION_PORT:-8001}:8000"
    volumes:
      - ./microservicios/shared:/app/shared:ro
      - photos:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  # ---------------------------------------------------------
  # 3. Microservicio: Modificación (PUT/PATCH)
  # ---------------------------------------------------------
  modificacion:
    build: ./microservicios/ms-modificar
    container_name: explorapp_modificacion
    restart: unless-stopped
    env_file: .env
    ports:
      - "${MS_MODIFICACION_PORT:-8002}:8000"
    volumes:
      - ./microservicios/shared:/app/shared:ro
      - photos:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  # ---------------------------------------------------------
  # 4. Microservicio: Consulta (GET) — diseñado para escalar
  #    Usar:  docker compose up -d --scale consulta=N
  #    El rango de puertos empieza en 8010 para no colisionar
  #    con los puertos fijos de borrado (8004) y log (8005).
  # ---------------------------------------------------------
  consulta:
    build: ./microservicios/ms-consultar
    restart: unless-stopped
    env_file: .env
    ports:
      - "8003:8000"
    volumes:
      - ./microservicios/shared:/app/shared:ro
      - photos:/app/uploads:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  # ---------------------------------------------------------
  # 5. Microservicio: Borrado (DELETE)
  # ---------------------------------------------------------
  borrado:
    build: ./microservicios/ms-borrar
    container_name: explorapp_borrado
    restart: unless-stopped
    env_file: .env
    ports:
      - "${MS_BORRADO_PORT:-8004}:8000"
    volumes:
      - ./microservicios/shared:/app/shared:ro
      - photos:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  # ---------------------------------------------------------
  # 6. Microservicio: Log (auditoría)
  # ---------------------------------------------------------
  log:
    build: ./microservicios/ms-log
    container_name: explorapp_log
    restart: unless-stopped
    env_file: .env
    ports:
      - "${MS_LOG_PORT:-8005}:8000"
    volumes:
      - ./microservicios/shared:/app/shared:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  # ---------------------------------------------------------
  # 7. n8n — motor de automatización + RAG
  # ---------------------------------------------------------
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: explorapp_n8n
    restart: unless-stopped
    env_file: .env
    environment:
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: ${N8N_PORT}
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      NODE_ENV: ${NODE_ENV}
    ports:
      - "${N8N_PUBLIC_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  # ---------------------------------------------------------
  # 8. Frontend — React + Vite + Tailwind
  # ---------------------------------------------------------
  frontend:
    build: ./frontend
    container_name: explorapp_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - creacion
      - modificacion
      - consulta
      - borrado
      - log
    networks:
      - app_network

# =========================================================
# Red interna privada
# =========================================================
networks:
  app_network:
    driver: bridge
    name: explorapp_app_network

# =========================================================
# Volúmenes persistentes
# =========================================================
volumes:
  pg_data:
    name: explorapp_pg_data
  photos:
    name: explorapp_photos
  n8n_data:
    name: explorapp_n8n_data
